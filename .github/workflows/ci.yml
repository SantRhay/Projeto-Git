name: Ci - Projeto Git

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4.

      - name: Setup ambiente de desenvolvimento
        run: echo "Ambiente de desenvolvimento configurado"
      
      - name: Validação (Lint)
        run: |
          echo "Verificando arquivos .md..." 
          ls *.md
        
      - name: Testes básicos
        run: |
          echo "Executando testes básicos..."
          echo "Testes concluídos com sucesso!"

      - name: Finalização
        run: echo "Processo de CI concluído com sucesso!"